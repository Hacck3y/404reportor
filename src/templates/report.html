<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <style>
{{highlightStyles}}
{{styles}}
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">RR</span>
        <div>
          <strong>404reportor</strong>
          <small>Portable assessment report</small>
        </div>
      </div>
      <div class="sidebar-meta">
        <span>{{machine}}</span>
        <span>{{date}}</span>
        <span class="severity severity-{{severity}}">{{severity}}</span>
      </div>
      {{toc}}
    </aside>

    <main class="report-shell">
      <section class="cover-page">
        <p class="eyebrow">Confidential Security Report</p>
        <h1>{{title}}</h1>
        <p>{{subtitle}}</p>
        <div class="cover-meta">
          <span>Overall severity: <strong>{{severity}}</strong></span>

        </div>
      </section>

      <div class="toolbar">
        <button type="button" data-theme-toggle aria-label="Toggle dark or light mode">Theme</button>
      </div>

      <article class="report-content">
        {{content}}
      </article>

      {{imageGallery}}
    </main>

    <script>
{{script}}
    </script>
  </body>
</html>
