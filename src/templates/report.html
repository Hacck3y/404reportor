<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Security assessment report generated by 404reportor">
    <title>{{title}}</title>
    <style>
{{highlightStyles}}
{{styles}}
    </style>
  </head>
  <body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark">4R</span>
        <div>
          <strong>404reportor</strong>
          <small>Security Assessment Report</small>
        </div>
      </div>
      <div class="sidebar-meta">
        <span>&#x1f3af; {{machine}}</span>
        <span>&#x1f4c5; {{date}}</span>
        <span class="severity severity-{{severity}}">{{severity}}</span>
      </div>
      <span class="toc-label">Contents</span>
      {{toc}}
    </aside>

    <main class="report-shell">
      <section class="cover-page">
        <p class="eyebrow">Confidential Security Report</p>
        <h1>{{title}}</h1>
        <p>{{subtitle}}</p>
        <div class="cover-meta">
          <span>Severity: <strong>{{severity}}</strong></span>
          <span>Generated by 404reportor</span>
        </div>
      </section>

      <div class="toolbar">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle dark or light mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span>Theme</span>
        </button>
      </div>

      <article class="report-content">
        {{content}}
      </article>

      {{imageGallery}}

      <footer class="report-footer">
        <span>Generated by <a href="https://www.npmjs.com/package/404reportor" target="_blank" rel="noopener">404reportor</a></span>
        <span>{{date}}</span>
      </footer>
    </main>

    <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script>
{{script}}
    </script>
  </body>
</html>
